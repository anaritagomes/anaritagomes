<svg width="720" height="180" viewBox="0 0 720 180" xmlns="http://www.w3.org/2000/svg">
  <rect width="720" height="180" fill="#0a0a0f"/>

  <!-- Source document bar -->
  <text x="20" y="22" fill="#2e2e42" font-size="9" font-family="'JetBrains Mono', monospace" letter-spacing="2">// SOURCE DOCUMENT</text>
  <rect x="20" y="30" width="680" height="28" fill="#0d0d15" stroke="#1e1e2a" stroke-width="1"/>
  <text x="360" y="49" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">continuous text ···············································································································</text>

  <!-- Chunk 1 -->
  <rect x="20" y="80" width="220" height="40" fill="#0d0d15" stroke="#1e1e2a" stroke-width="1"/>
  <text x="120" y="96" fill="#6b6b80" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">chunk 1</text>
  <text x="120" y="110" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">500 chars</text>

  <!-- Overlap 1→2 -->
  <rect x="200" y="80" width="60" height="40" fill="#7B35E4" fill-opacity="0.12" stroke="#7B35E4" stroke-width="1" stroke-opacity="0.4"/>
  <text x="230" y="96" fill="#7B35E4" font-size="8" font-family="'JetBrains Mono', monospace" text-anchor="middle" opacity="0.8">overlap</text>
  <text x="230" y="108" fill="#7B35E4" font-size="8" font-family="'JetBrains Mono', monospace" text-anchor="middle" opacity="0.8">50c</text>

  <!-- Chunk 2 -->
  <rect x="220" y="80" width="220" height="40" fill="#0d0d15" stroke="#1e1e2a" stroke-width="1"/>
  <text x="330" y="96" fill="#6b6b80" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">chunk 2</text>
  <text x="330" y="110" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">500 chars</text>

  <!-- Overlap 2→3 -->
  <rect x="400" y="80" width="60" height="40" fill="#7B35E4" fill-opacity="0.12" stroke="#7B35E4" stroke-width="1" stroke-opacity="0.4"/>
  <text x="430" y="96" fill="#7B35E4" font-size="8" font-family="'JetBrains Mono', monospace" text-anchor="middle" opacity="0.8">overlap</text>
  <text x="430" y="108" fill="#7B35E4" font-size="8" font-family="'JetBrains Mono', monospace" text-anchor="middle" opacity="0.8">50c</text>

  <!-- Chunk 3 -->
  <rect x="420" y="80" width="220" height="40" fill="#0d0d15" stroke="#1e1e2a" stroke-width="1"/>
  <text x="530" y="96" fill="#6b6b80" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">chunk 3</text>
  <text x="530" y="110" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">500 chars</text>

  <!-- Overlap 3→4 -->
  <rect x="600" y="80" width="60" height="40" fill="#7B35E4" fill-opacity="0.12" stroke="#7B35E4" stroke-width="1" stroke-opacity="0.4"/>
  <text x="630" y="96" fill="#7B35E4" font-size="8" font-family="'JetBrains Mono', monospace" text-anchor="middle" opacity="0.8">overlap</text>
  <text x="630" y="108" fill="#7B35E4" font-size="8" font-family="'JetBrains Mono', monospace" text-anchor="middle" opacity="0.8">50c</text>

  <!-- dot dot dot -->
  <text x="686" y="104" fill="#3d3d55" font-size="10" font-family="'JetBrains Mono', monospace">···</text>

  <!-- Connector lines from source bar down -->
  <line x1="20" y1="58" x2="20" y2="80" stroke="#1e1e2a" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="240" y1="58" x2="240" y2="80" stroke="#1e1e2a" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="440" y1="58" x2="440" y2="80" stroke="#1e1e2a" stroke-width="1" stroke-dasharray="3,4"/>
  <line x1="640" y1="58" x2="640" y2="80" stroke="#1e1e2a" stroke-width="1" stroke-dasharray="3,4"/>

  <!-- Legend -->
  <rect x="20" y="148" width="12" height="12" fill="#7B35E4" fill-opacity="0.12" stroke="#7B35E4" stroke-width="1" stroke-opacity="0.4"/>
  <text x="38" y="159" fill="#6b6b80" font-size="9" font-family="'JetBrains Mono', monospace">overlap region — ensures sentences at boundaries are not lost</text>
</svg>
