<svg width="720" height="280" viewBox="0 0 720 280" xmlns="http://www.w3.org/2000/svg">
  <rect width="720" height="280" fill="#0a0a0f"/>

  <!-- INDEXING PIPELINE label -->
  <text x="20" y="22" fill="#2e2e42" font-size="9" font-family="'JetBrains Mono', monospace" letter-spacing="2">// INDEXING PIPELINE</text>

  <!-- boxes: Documents → Chunk → Embed → Vector Store -->
  <!-- Documents -->
  <rect x="20" y="32" width="100" height="52" fill="#0d0d15" stroke="#1e1e2a" stroke-width="1"/>
  <text x="70" y="54" fill="#6b6b80" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="middle">documents</text>
  <text x="70" y="68" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">PDFs / text</text>
  <line x1="120" y1="58" x2="138" y2="58" stroke="#2a2a3a" stroke-width="1"/>
  <polygon points="136,54 144,58 136,62" fill="#2a2a3a"/>

  <!-- Chunk -->
  <rect x="144" y="32" width="100" height="52" fill="#0d0d15" stroke="#1e1e2a" stroke-width="1"/>
  <text x="194" y="54" fill="#6b6b80" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="middle">chunk</text>
  <text x="194" y="68" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">500c / 50c overlap</text>
  <line x1="244" y1="58" x2="262" y2="58" stroke="#2a2a3a" stroke-width="1"/>
  <polygon points="260,54 268,58 260,62" fill="#2a2a3a"/>

  <!-- Embed -->
  <rect x="268" y="32" width="100" height="52" fill="#0d0d15" stroke="#1e1e2a" stroke-width="1"/>
  <text x="318" y="54" fill="#6b6b80" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="middle">embed</text>
  <text x="318" y="68" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">MiniLM-L6-v2</text>
  <line x1="368" y1="58" x2="386" y2="58" stroke="#2a2a3a" stroke-width="1"/>
  <polygon points="384,54 392,58 384,62" fill="#2a2a3a"/>

  <!-- Vector Store (shared, centre) -->
  <rect x="392" y="20" width="120" height="240" fill="#0d0d15" stroke="#7B35E4" stroke-width="1" stroke-opacity="0.6"/>
  <text x="452" y="135" fill="#e8e8f0" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="middle">vector</text>
  <text x="452" y="149" fill="#e8e8f0" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="middle">store</text>
  <text x="452" y="163" fill="#6b6b80" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">ChromaDB</text>

  <!-- RETRIEVAL PIPELINE label -->
  <text x="20" y="162" fill="#2e2e42" font-size="9" font-family="'JetBrains Mono', monospace" letter-spacing="2">// RETRIEVAL + GENERATION</text>

  <!-- Query -->
  <rect x="20" y="172" width="100" height="52" fill="#0d0d15" stroke="#1e1e2a" stroke-width="1"/>
  <text x="70" y="194" fill="#6b6b80" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="middle">query</text>
  <text x="70" y="208" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">user question</text>
  <line x1="120" y1="198" x2="138" y2="198" stroke="#2a2a3a" stroke-width="1"/>
  <polygon points="136,194 144,198 136,202" fill="#2a2a3a"/>

  <!-- Embed (query) -->
  <rect x="144" y="172" width="100" height="52" fill="#0d0d15" stroke="#1e1e2a" stroke-width="1"/>
  <text x="194" y="194" fill="#6b6b80" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="middle">embed</text>
  <text x="194" y="208" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">same model</text>
  <line x1="244" y1="198" x2="262" y2="198" stroke="#2a2a3a" stroke-width="1"/>
  <polygon points="260,194 268,198 260,202" fill="#2a2a3a"/>

  <!-- Retrieve arrow from vector store -->
  <line x1="512" y1="198" x2="530" y2="198" stroke="#2a2a3a" stroke-width="1"/>
  <polygon points="528,194 536,198 528,202" fill="#2a2a3a"/>

  <!-- Query embed to vector store arrow -->
  <line x1="268" y1="198" x2="392" y2="198" stroke="#2a2a3a" stroke-width="1"/>

  <!-- Prompt -->
  <rect x="536" y="172" width="80" height="52" fill="#0d0d15" stroke="#1e1e2a" stroke-width="1"/>
  <text x="576" y="192" fill="#6b6b80" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="middle">prompt</text>
  <text x="576" y="205" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">chunks</text>
  <text x="576" y="217" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">+ question</text>
  <line x1="616" y1="198" x2="630" y2="198" stroke="#2a2a3a" stroke-width="1"/>
  <polygon points="628,194 636,198 628,202" fill="#2a2a3a"/>

  <!-- LLM -->
  <rect x="636" y="172" width="64" height="52" fill="#0d0d15" stroke="#1e1e2a" stroke-width="1"/>
  <text x="668" y="194" fill="#6b6b80" font-size="10" font-family="'JetBrains Mono', monospace" text-anchor="middle">LLM</text>
  <text x="668" y="208" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', monospace" text-anchor="middle">answer</text>
</svg>
