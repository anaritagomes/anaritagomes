<svg width="720" height="340" viewBox="0 0 720 340" xmlns="http://www.w3.org/2000/svg">
  <rect width="720" height="340" fill="#0a0a0f"/>

  <!-- Origin at (200, 290) -->

  <!-- Axes -->
  <line x1="200" y1="290" x2="500" y2="290" stroke="#3d3d55" stroke-width="1"/>
  <polygon points="498,286 508,290 498,294" fill="#3d3d55"/>
  <line x1="200" y1="290" x2="200" y2="50" stroke="#3d3d55" stroke-width="1"/>
  <polygon points="196,52 200,42 204,52" fill="#3d3d55"/>
  <text x="186" y="302" fill="#6b6b80" font-size="9" font-family="'JetBrains Mono', monospace">0</text>

  <!--
    Vector A: 50° above x-axis, length 220
      endpoint: (200 + 220*cos50, 290 - 220*sin50) = (341, 122)
    Vector B: 33° above x-axis, length 220
      endpoint: (200 + 220*cos33, 290 - 220*sin33) = (384, 170)
    Angle between A and B: 50 - 33 = 17°, cos(17°) ≈ 0.96

    Vector C: 88° above x-axis (nearly vertical), length 220
      endpoint: (200 + 220*cos88, 290 - 220*sin88) = (208, 71)
  -->

  <!-- Vector C (unrelated — dim, nearly vertical) -->
  <line x1="200" y1="290" x2="208" y2="71" stroke="#3d3d55" stroke-width="2"/>
  <!-- arrowhead pointing up-right slightly: tip at (208,71), perpendicular to (0.07,-0.998) -->
  <polygon points="208,71 202.6,82.8 212.6,83.2" fill="#3d3d55"/>
  <!-- label to the left -->
  <text x="20" y="80" fill="#6b6b80" font-size="8" font-family="'JetBrains Mono', monospace">"The capital of France"</text>
  <text x="20" y="92" fill="#6b6b80" font-size="8" font-family="'JetBrains Mono', monospace">cos(θ) ≈ 0.04</text>
  <line x1="148" y1="82" x2="204" y2="82" stroke="#2a2a3a" stroke-width="1" stroke-dasharray="3,3"/>

  <!-- Vector A: 50° — white -->
  <line x1="200" y1="290" x2="341" y2="122" stroke="#e8e8f0" stroke-width="2"/>
  <!-- arrowhead: tip at (341,122), direction (0.643,-0.766), perp (0.766,0.643)
       base left: (341 - 9*0.643 - 5*0.766, 122 + 9*0.766 - 5*0.643) = (325, 132)
       base right: (341 - 9*0.643 + 5*0.766, 122 + 9*0.766 + 5*0.643) = (337, 136) -->
  <polygon points="341,122 329.5,128 337.1,134.4" fill="#e8e8f0"/>
  <text x="347" y="118" fill="#e8e8f0" font-size="10" font-family="'JetBrains Mono', monospace" font-weight="bold">a</text>
  <text x="347" y="132" fill="#c8c8d8" font-size="8" font-family="'JetBrains Mono', monospace">"What is the refund policy?"</text>

  <!-- Vector B: 33° — purple -->
  <line x1="200" y1="290" x2="384" y2="170" stroke="#a060ff" stroke-width="2"/>
  <!-- arrowhead: tip at (384,170), direction (0.839,-0.545), perp (0.545,0.839)
       base left: (384 - 9*0.839 - 5*0.545, 170 + 9*0.545 - 5*0.839) = (366, 171)
       base right: (384 - 9*0.839 + 5*0.545, 170 + 9*0.545 + 5*0.839) = (379, 179) -->
  <polygon points="384,170 371.2,172.4 376.6,180.8" fill="#a060ff"/>
  <text x="390" y="166" fill="#a060ff" font-size="10" font-family="'JetBrains Mono', monospace" font-weight="bold">b</text>
  <text x="390" y="180" fill="#c8c8d8" font-size="8" font-family="'JetBrains Mono', monospace">"How do I get my money back?"</text>

  <!--
    Arc at radius 80 from (200,290):
    A at 50°: (200 + 80*cos50, 290 - 80*sin50) = (251, 229)
    B at 33°: (200 + 80*cos33, 290 - 80*sin33) = (267, 247)
    Arc from B→A, sweep=0 (counter-clockwise)
    Label at midpoint 41.5°, radius 100:
      (200 + 100*cos41.5, 290 - 100*sin41.5) = (275, 224)
  -->
  <path d="M 267 247 A 80 80 0 0 0 251 229" fill="none" stroke="#a060ff" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="276" y="238" fill="#a060ff" font-size="9" font-family="'JetBrains Mono', monospace">θ ≈ 17°</text>
  <text x="276" y="250" fill="#a060ff" font-size="9" font-family="'JetBrains Mono', monospace">cos(θ) ≈ 0.96</text>

  <!-- Divider -->
  <line x1="560" y1="40" x2="560" y2="310" stroke="#1e1e2a" stroke-width="1" stroke-dasharray="1,8"/>

  <!-- Formula panel -->
  <text x="576" y="65" fill="#c8c8d8" font-size="9" font-family="'JetBrains Mono', monospace">cos(θ) =  a · b</text>
  <line x1="620" y1="70" x2="700" y2="70" stroke="#3d3d55" stroke-width="1"/>
  <text x="626" y="82" fill="#c8c8d8" font-size="9" font-family="'JetBrains Mono', monospace">‖a‖ · ‖b‖</text>

  <text x="576" y="120" fill="#6b6b80" font-size="9" font-family="'JetBrains Mono', monospace">1.0  →  identical</text>
  <text x="576" y="136" fill="#6b6b80" font-size="9" font-family="'JetBrains Mono', monospace">0.5  →  related</text>
  <text x="576" y="152" fill="#6b6b80" font-size="9" font-family="'JetBrains Mono', monospace">0.0  →  unrelated</text>

  <!-- Legend -->
  <line x1="576" y1="190" x2="596" y2="190" stroke="#e8e8f0" stroke-width="2"/>
  <text x="604" y="194" fill="#c8c8d8" font-size="8" font-family="'JetBrains Mono', monospace">similar vectors</text>
  <line x1="576" y1="208" x2="596" y2="208" stroke="#3d3d55" stroke-width="2"/>
  <text x="604" y="212" fill="#6b6b80" font-size="8" font-family="'JetBrains Mono', monospace">unrelated vector</text>

  <text x="576" y="250" fill="#3d3d55" font-size="8" font-family="'JetBrains Mono', monospace">measures angle,</text>
  <text x="576" y="262" fill="#3d3d55" font-size="8" font-family="'JetBrains Mono', monospace">not magnitude</text>
</svg>
