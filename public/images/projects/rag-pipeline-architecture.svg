<svg width="760" height="270" viewBox="0 0 760 270" xmlns="http://www.w3.org/2000/svg">
  <rect width="760" height="270" fill="#0a0a0f"/>

  <!-- INGEST label -->
  <text x="20" y="24" fill="#2e2e42" font-size="9" font-family="'JetBrains Mono', 'Courier New', monospace" letter-spacing="3">// INGEST</text>

  <!-- Box 1: papers/ -->
  <rect x="20" y="34" width="110" height="54" fill="#0d0d15" stroke="#1e1e2a" stroke-width="1"/>
  <text x="75" y="57" fill="#6b6b80" font-size="10" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">papers/</text>
  <text x="75" y="71" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">5 × PDF</text>

  <line x1="130" y1="61" x2="152" y2="61" stroke="#2a2a3a" stroke-width="1"/>
  <polygon points="150,57 158,61 150,65" fill="#2a2a3a"/>

  <!-- Box 2: PyPDF -->
  <rect x="158" y="34" width="110" height="54" fill="#0d0d15" stroke="#1e1e2a" stroke-width="1"/>
  <text x="213" y="57" fill="#6b6b80" font-size="10" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">PyPDF</text>
  <text x="213" y="71" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">load</text>

  <line x1="268" y1="61" x2="290" y2="61" stroke="#2a2a3a" stroke-width="1"/>
  <polygon points="288,57 296,61 288,65" fill="#2a2a3a"/>

  <!-- Box 3: Splitter -->
  <rect x="296" y="34" width="110" height="54" fill="#0d0d15" stroke="#1e1e2a" stroke-width="1"/>
  <text x="351" y="54" fill="#6b6b80" font-size="10" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">splitter</text>
  <text x="351" y="67" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">500 chars</text>
  <text x="351" y="79" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">50 overlap</text>

  <line x1="406" y1="61" x2="428" y2="61" stroke="#2a2a3a" stroke-width="1"/>
  <polygon points="426,57 434,61 426,65" fill="#2a2a3a"/>

  <!-- Box 4: Embedder -->
  <rect x="434" y="34" width="110" height="54" fill="#0d0d15" stroke="#1e1e2a" stroke-width="1"/>
  <text x="489" y="54" fill="#6b6b80" font-size="10" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">embedder</text>
  <text x="489" y="67" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">MiniLM-L6</text>
  <text x="489" y="79" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">384-dim</text>

  <line x1="544" y1="61" x2="566" y2="61" stroke="#2a2a3a" stroke-width="1"/>
  <polygon points="564,57 572,61 564,65" fill="#2a2a3a"/>

  <!-- Box 5: ChromaDB (ingest) -->
  <rect x="572" y="34" width="120" height="54" fill="#0d0d15" stroke="#7B35E4" stroke-width="1" stroke-opacity="0.5"/>
  <text x="632" y="57" fill="#e8e8f0" font-size="10" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">ChromaDB</text>
  <text x="632" y="71" fill="#6b6b80" font-size="9" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">607 chunks</text>
  <text x="632" y="83" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">persisted</text>

  <!-- Divider -->
  <line x1="20" y1="142" x2="740" y2="142" stroke="#1a1a24" stroke-width="1" stroke-dasharray="4,6"/>

  <!-- QUERY label -->
  <text x="20" y="163" fill="#2e2e42" font-size="9" font-family="'JetBrains Mono', 'Courier New', monospace" letter-spacing="3">// QUERY</text>

  <!-- Box 1: question -->
  <rect x="20" y="173" width="95" height="54" fill="#0d0d15" stroke="#1e1e2a" stroke-width="1"/>
  <text x="67" y="196" fill="#6b6b80" font-size="10" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">question</text>
  <text x="67" y="210" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">user input</text>

  <line x1="115" y1="200" x2="132" y2="200" stroke="#2a2a3a" stroke-width="1"/>
  <polygon points="130,196 138,200 130,204" fill="#2a2a3a"/>

  <!-- Box 2: embedder -->
  <rect x="138" y="173" width="110" height="54" fill="#0d0d15" stroke="#1e1e2a" stroke-width="1"/>
  <text x="193" y="193" fill="#6b6b80" font-size="10" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">embedder</text>
  <text x="193" y="206" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">same model</text>
  <text x="193" y="218" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">384-dim</text>

  <line x1="248" y1="200" x2="265" y2="200" stroke="#2a2a3a" stroke-width="1"/>
  <polygon points="263,196 271,200 263,204" fill="#2a2a3a"/>

  <!-- Box 3: ChromaDB (query) -->
  <rect x="271" y="173" width="120" height="54" fill="#0d0d15" stroke="#7B35E4" stroke-width="1" stroke-opacity="0.5"/>
  <text x="331" y="193" fill="#e8e8f0" font-size="10" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">ChromaDB</text>
  <text x="331" y="206" fill="#6b6b80" font-size="9" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">top-4 chunks</text>
  <text x="331" y="218" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">cosine sim</text>

  <line x1="391" y1="200" x2="408" y2="200" stroke="#2a2a3a" stroke-width="1"/>
  <polygon points="406,196 414,200 406,204" fill="#2a2a3a"/>

  <!-- Box 4: prompt -->
  <rect x="414" y="173" width="100" height="54" fill="#0d0d15" stroke="#1e1e2a" stroke-width="1"/>
  <text x="464" y="193" fill="#6b6b80" font-size="10" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">prompt</text>
  <text x="464" y="206" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">template</text>
  <text x="464" y="218" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">+ context</text>

  <line x1="514" y1="200" x2="531" y2="200" stroke="#2a2a3a" stroke-width="1"/>
  <polygon points="529,196 537,200 529,204" fill="#2a2a3a"/>

  <!-- Box 5: LM Studio -->
  <rect x="537" y="173" width="100" height="54" fill="#0d0d15" stroke="#1e1e2a" stroke-width="1"/>
  <text x="587" y="193" fill="#6b6b80" font-size="10" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">LM Studio</text>
  <text x="587" y="206" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">local LLM</text>
  <text x="587" y="218" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">t=0.2</text>

  <line x1="637" y1="200" x2="654" y2="200" stroke="#2a2a3a" stroke-width="1"/>
  <polygon points="652,196 660,200 652,204" fill="#2a2a3a"/>

  <!-- Box 6: answer -->
  <rect x="660" y="173" width="80" height="54" fill="#0d0d15" stroke="#1e1e2a" stroke-width="1"/>
  <text x="700" y="196" fill="#6b6b80" font-size="10" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">answer</text>
  <text x="700" y="210" fill="#3d3d55" font-size="9" font-family="'JetBrains Mono', 'Courier New', monospace" text-anchor="middle">+ source</text>
</svg>
